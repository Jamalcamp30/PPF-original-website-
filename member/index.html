<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter the PPF System — PPF Athletics</title>
  <meta name="description" content="Welcome to the PPF member system. Sign in with Google, Apple, or Microsoft — or explore as a guest." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ppf-member.css" />
</head>
<body class="ppf-entry-body">

  <!-- ============================================================
       PPF ENTRY — ENTER THE PPF SYSTEM
       Premium identity layer: not a login box, a gateway
  ============================================================ -->

  <!-- Boot-up animation overlay -->
  <div class="ppf-boot" id="ppfBoot" aria-live="polite">
    <div class="boot-logo">PPF</div>
    <div class="boot-tagline">ATHLETICS</div>
    <div class="boot-status" id="bootStatus">INITIALIZING SYSTEM…</div>
    <div class="boot-bar"><div class="boot-bar-fill" id="bootBarFill"></div></div>
  </div>

  <div class="entry-wrapper" id="entryWrapper">
    <!-- Ambient background -->
    <div class="entry-ambient"></div>

    <!-- Back to main site -->
    <a href="../index.html" class="entry-back" aria-label="Back to PPF Athletics website">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 16L7 10L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      ppfathletics.com
    </a>

    <main class="entry-card">
      <!-- PPF Logo -->
      <div class="entry-logo">
        <span class="entry-logo-mark">PPF</span>
        <span class="entry-logo-tag">ATHLETICS</span>
      </div>

      <!-- Time-of-day greeting -->
      <h1 class="entry-title" id="entryGreeting">Welcome to PPF</h1>
      <p class="entry-subtitle">Enter the system. Track the work. Build the result.</p>

      <!-- Auth Buttons -->
      <div class="entry-auth-buttons">
        <button class="auth-btn auth-google" id="btnGoogle" type="button">
          <svg class="auth-icon" viewBox="0 0 24 24" width="22" height="22"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="auth-btn auth-apple" id="btnApple" type="button">
          <svg class="auth-icon" viewBox="0 0 24 24" width="22" height="22"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.11 4.45-3.74 4.25z" fill="currentColor"/></svg>
          Continue with Apple
        </button>
        <button class="auth-btn auth-microsoft" id="btnMicrosoft" type="button">
          <svg class="auth-icon" viewBox="0 0 24 24" width="22" height="22"><rect x="1" y="1" width="10" height="10" fill="#F25022"/><rect x="13" y="1" width="10" height="10" fill="#7FBA00"/><rect x="1" y="13" width="10" height="10" fill="#00A4EF"/><rect x="13" y="13" width="10" height="10" fill="#FFB900"/></svg>
          Continue with Microsoft
        </button>
      </div>

      <!-- Divider -->
      <div class="entry-divider">
        <span class="entry-divider-line"></span>
        <span class="entry-divider-text">or</span>
        <span class="entry-divider-line"></span>
      </div>

      <!-- Email login -->
      <form class="entry-email-form" id="emailForm" autocomplete="on">
        <div class="entry-field">
          <input type="email" id="emailInput" class="entry-input" placeholder="Email address" required autocomplete="email" />
        </div>
        <div class="entry-field" id="passwordField" style="display:none;">
          <input type="password" id="passwordInput" class="entry-input" placeholder="Password" autocomplete="current-password" />
        </div>
        <button type="submit" class="auth-btn auth-email" id="btnEmail">
          Continue with Email
        </button>
        <button type="button" class="entry-magic-link" id="btnMagicLink" style="display:none;">
          Send me a magic link instead
        </button>
      </form>

      <!-- Guest -->
      <div class="entry-guest-section">
        <button class="auth-btn auth-guest" id="btnGuest" type="button">
          Continue as Guest
        </button>
        <p class="entry-guest-note">Explore the standard. No account required.</p>
      </div>

      <!-- Footer text -->
      <p class="entry-legal">
        By continuing, you agree to PPF Athletics' terms and privacy policy.
      </p>
    </main>

    <!-- Ambient coaching command -->
    <div class="entry-coach-line" id="entryCoachLine">
      The standard is always live.
    </div>
  </div>

  <script src="../js/ppf-member.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof PPFMember !== 'undefined') {
        PPFMember.initEntry();
      }
    });
  </script>
</body>
</html>
